<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — BhAAi Fans Digital AA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/responsive.css" />
  <style>
    .auth-container {
      max-width: 450px;
      margin: 10rem auto 5rem;
      padding: 3rem;
      background: var(--gray-1);
      border-radius: 4px;
      border: 1px solid var(--gray-2);
    }
    .auth-container h1 { text-align: center; margin-bottom: 2rem; }
    .auth-form .form-group { margin-bottom: 1.5rem; }
    .auth-form label { display: block; margin-bottom: 0.5rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--gray-3); text-transform: uppercase; }
    .auth-form input { width: 100%; padding: 1rem; border: 1px solid var(--gray-2); background: transparent; color: var(--text-light); border-radius: 4px; font-family: var(--font-body); outline: none; transition: border-color 0.3s ease; }
    .auth-form input:focus { border-color: var(--accent); }
    .auth-btn { width: 100%; margin-top: 1rem; text-align: center; }
    .auth-links { margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--gray-3); }
    .auth-links a { color: var(--accent); text-decoration: none; }
    #auth-error { color: #ff4444; margin-bottom: 1rem; font-size: 0.9rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <!-- Nav (simplified) -->
  <nav>
    <a href="/" class="nav-logo">BhAAi Fans<span>.</span></a>
    <a href="/contact.html" class="nav-cta">Get in touch</a>
  </nav>

  <div class="auth-container">
    <h1>Create an Account</h1>
    <div id="auth-error"></div>
    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" minlength="6" />
      </div>
      <button type="submit" class="btn-primary auth-btn">Sign Up</button>
    </form>
    <div class="auth-links">
      Already have an account? <a href="/login.html">Log in</a>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
  <script type="module">
    import { auth, db, collection, addDoc, serverTimestamp } from "/static/js/firebase-config.js";
    import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js";

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('auth-error');
      
      const btn = e.target.querySelector('button');
      btn.textContent = 'Creating Account...';
      btn.disabled = true;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Update profile with name
        await updateProfile(user, { displayName: name });

        // Store additional user data in Firestore
        await addDoc(collection(db, "clients"), {
          uid: user.uid,
          name: name,
          email: email,
          created_at: serverTimestamp()
        });

        // Redirect to home
        window.location.href = '/';
      } catch (err) {
        btn.textContent = 'Sign Up';
        btn.disabled = false;
        errorDiv.textContent = 'Error: ' + err.message;
        errorDiv.style.display = 'block';
      }
    });

    // Simple Auth Observer for Nav (Optional here but good for consistency)
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.2/firebase-auth.js";
    onAuthStateChanged(auth, (user) => {
      const btn = document.getElementById('nav-login-btn');
      if (user && btn) {
        btn.textContent = 'Dashboard';
        btn.href = '/admin-dashboard/dashboard.html'; // In a real app, check roles
      }
    });
  </script>
</body>
</html>
